server {
    listen 8888;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Netlify functions to the bot if needed, 
    # but usually these are deployed separately to Netlify.
    # For a local "production" docker run, we'll assume 
    # the bot or a separate function server handles them.
    location /api/ {
        proxy_pass http://trading-bot:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
