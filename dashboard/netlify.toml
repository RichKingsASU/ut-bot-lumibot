[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  autoLaunch = false
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
