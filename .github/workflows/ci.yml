name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Syntax check
      run: |
        python -m py_compile config.py main.py strategies/ut_bot.py

    - name: Security scan (Secrets check)
      run: |
        # Fail only on actual hardcoded secret VALUES (not env var references)
        # A hardcoded secret looks like: API_KEY = "ABCD1234..." (quoted value)
        # NOT: os.getenv("API_KEY"), print("API_KEY not set"), f"Bearer {token}"
        if grep -rn \
          -e 'ALPACA_API_KEY\s*=\s*"[A-Z0-9]\{10,\}"' \
          -e 'ALPACA_API_SECRET\s*=\s*"[A-Za-z0-9]\{20,\}"' \
          --include="*.py" \
          --exclude-dir=".git" \
          .; then
          echo "ERROR: Hardcoded API secrets found in Python files"
          exit 1
        fi
        echo "Security scan passed — no hardcoded secrets found"
