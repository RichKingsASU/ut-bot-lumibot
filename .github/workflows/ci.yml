name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Syntax check
      run: |
        python -m py_compile config.py main.py strategies/ut_bot.py

    - name: Security scan (Secrets check)
      run: |
        # Fail if any secrets are accidentally committed to code files
        ! grep -r "API_KEY\|API_SECRET\|Bearer" . --include="*.py"
