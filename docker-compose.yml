version: '3.8'

services:
  trading-bot:
    build: .
    container_name: ut-bot-lumibot
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
